<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🌳 Tree Risk</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>🌳 Tree Risk</h2>
  <div class="links">
    <span>Mapa</span>
    <span>Relatórios</span>
  </div>
</div>

<!-- CONTAINER -->
<div class="container">
  <h1>Monitoramento de Árvores Urbanas</h1>

  <div class="card">
    <div id="map"></div>

    <!-- BOTÃO FLUTUANTE -->
    <button id="btn-add">+ Cadastrar árvore</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="hidden">
  <div class="modal-box">
    <h3>Nova árvore</h3>
    <input type="text" id="especie" placeholder="Espécie">

    <div class="modal-actions">
      <button onclick="confirmarCadastro()">Cadastrar</button>
      <button onclick="fecharModal()" class="cancel">Cancelar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
